<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Gatorade Combine — Interview Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #000; color: #fff;
    font-family: 'Barlow', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
  }
  a { color: inherit; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  :root {
    --black:#000; --near:#0a0a0a; --dark:#141414; --mid:#222;
    --border:#2a2a2a; --gray:#555; --light:#888; --silver:#bbb;
    --orange:#FBB031; --orange-deep:#E89A1D; --orange-light:#FFC857;
    --orange-glow:rgba(251,176,49,0.12); --orange-border:rgba(251,176,49,0.3);
    --red:#EF3C42; --red-glow:rgba(239,60,66,0.12); --red-border:rgba(239,60,66,0.3);
    --green:#22c55e; --green-glow:rgba(34,197,94,0.15);
    --purple:#a855f7; --purple-glow:rgba(168,85,247,0.12); --purple-border:rgba(168,85,247,0.3);
  }

  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }

  .fade-up { animation: fadeUp 0.5s ease both; }
  .pulse { animation: pulse 2s infinite; }

  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--orange), var(--red), var(--orange));
    z-index: 100;
  }
  .progress-bar {
    position: fixed; top: 4px; left: 0; height: 2px;
    background: var(--orange); z-index: 100;
    box-shadow: 0 0 8px var(--orange);
    transition: width 0.3s ease;
  }

  .container {
    max-width: 800px; margin: 0 auto; padding: 60px 24px 80px 24px;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; gap: 16px; flex-wrap: wrap;}
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo svg { flex-shrink: 0; }
  .logo-text {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 14px;
    letter-spacing: 3px; text-transform: uppercase; color: #fff;
  }
  .stats-pill {
    display: flex; gap: 12px; align-items: center;
    background: var(--near); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 14px;
  }
  .stat-item {
    display: flex; flex-direction: column; align-items: center;
    line-height: 1.1;
  }
  .stat-item .label {
    font-family: 'JetBrains Mono', monospace; font-size: 8px;
    color: var(--light); letter-spacing: 1.5px;
  }
  .stat-item .value {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 18px; color: var(--orange);
  }
  .stat-divider { width: 1px; height: 24px; background: var(--border); }

  .hero { text-align: left; margin-bottom: 40px; }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--orange); letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
    font-size: clamp(48px, 8vw, 80px); line-height: 0.9;
    letter-spacing: -2px; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .hero h1 .accent { color: var(--orange); }
  .hero h1 .accent2 { color: var(--red); }
  .hero p {
    font-size: 16px; color: var(--silver); line-height: 1.6;
    max-width: 600px; margin-bottom: 20px;
  }

  .mode-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px; margin-bottom: 32px;
  }
  .mode-card {
    background: var(--near); border: 1px solid var(--border);
    border-radius: 8px; padding: 22px 20px; text-align: left;
    cursor: pointer; transition: all 0.2s ease; position: relative;
    overflow: hidden; width: 100%;
  }
  .mode-card:hover {
    border-color: var(--orange-border);
    transform: translateY(-2px);
  }
  .mode-card.purple:hover { border-color: var(--purple-border); }
  .mode-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--orange), var(--red));
  }
  .mode-card.purple::before {
    background: linear-gradient(90deg, var(--purple), var(--orange));
  }
  .mode-card .mode-num {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--orange); letter-spacing: 2px; margin-bottom: 8px;
  }
  .mode-card.purple .mode-num { color: var(--purple); }
  .mode-card .mode-title {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 22px; text-transform: uppercase; line-height: 1;
    margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .mode-card .mode-subtitle {
    font-size: 13px; color: var(--silver); line-height: 1.5;
    margin-bottom: 12px;
  }
  .mode-card .mode-meta {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--light); letter-spacing: 0.5px;
  }
  .mode-card .pb { color: var(--orange); font-weight: 700; }
  .mode-card.purple .pb { color: var(--purple); }

  .section-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .section-header .label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--orange); letter-spacing: 3px; text-transform: uppercase;
    font-weight: 600;
  }
  .section-header .line {
    flex: 1; height: 1px; background: linear-gradient(90deg, var(--orange-border), transparent);
  }

  .quiz-screen { animation: fadeUp 0.4s ease; }
  .quiz-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .quiz-meta-left {
    display: flex; align-items: center; gap: 12px;
  }
  .difficulty-badge {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 10px; padding: 4px 10px; border-radius: 3px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .diff-easy { background: var(--green-glow); color: var(--green); }
  .diff-medium { background: var(--orange-glow); color: var(--orange); }
  .diff-hard { background: var(--red-glow); color: var(--red); }
  .question-counter {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--light); letter-spacing: 1px;
  }
  .quiz-progress {
    flex: 1; min-width: 120px; height: 4px; background: var(--mid);
    border-radius: 2px; overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--orange), var(--red));
    transition: width 0.4s ease;
  }

  .question-card {
    background: var(--near); border: 1px solid var(--border);
    border-radius: 10px; padding: 28px 26px; margin-bottom: 16px;
    border-left: 4px solid var(--orange);
  }
  .question-card.purple { border-left-color: var(--purple); }
  .question-type {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--orange); letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .question-type.purple { color: var(--purple); }
  .question-text {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 22px; color: #fff; line-height: 1.3;
    letter-spacing: 0.3px;
  }
  .question-context {
    font-size: 14px; color: var(--silver); line-height: 1.6;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
    font-style: italic;
  }

  .answers { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .answer {
    background: var(--near); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px; text-align: left;
    cursor: pointer; transition: all 0.15s ease;
    display: flex; align-items: flex-start; gap: 12px;
    width: 100%; font-size: 14px; line-height: 1.5; color: var(--silver);
  }
  .answer:hover:not(.disabled) {
    border-color: var(--orange);
    background: var(--dark);
  }
  .answer.selected {
    border-color: var(--orange);
    background: var(--orange-glow);
  }
  .answer .letter {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 16px; color: var(--orange);
    width: 22px; flex-shrink: 0;
  }
  .answer.correct {
    border-color: var(--green);
    background: var(--green-glow);
  }
  .answer.correct .letter { color: var(--green); }
  .answer.incorrect {
    border-color: var(--red);
    background: var(--red-glow);
  }
  .answer.incorrect .letter { color: var(--red); }
  .answer.disabled { cursor: default; }
  .answer .text { flex: 1; }

  .feedback {
    background: var(--near); border: 1px solid var(--border);
    border-radius: 10px; padding: 22px 24px; margin-bottom: 20px;
    animation: fadeUp 0.4s ease;
  }
  .feedback.correct { border-left: 4px solid var(--green); }
  .feedback.incorrect { border-left: 4px solid var(--red); }
  .feedback-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .feedback-badge {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 12px; padding: 4px 12px; border-radius: 3px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .feedback-badge.correct { background: var(--green-glow); color: var(--green); }
  .feedback-badge.incorrect { background: var(--red-glow); color: var(--red); }
  .feedback h3 {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 18px; color: #fff; text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .feedback p {
    font-size: 14px; color: var(--silver); line-height: 1.65; margin-bottom: 8px;
  }
  .feedback p:last-child { margin-bottom: 0; }
  .feedback strong { color: var(--orange); font-weight: 600; }
  .feedback .pro-tip {
    margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 13px; color: #fff;
  }
  .feedback .pro-tip-label {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 11px; color: var(--orange); letter-spacing: 2px;
    text-transform: uppercase; margin-right: 8px;
  }

  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    background: var(--orange); color: #000;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 14px; padding: 12px 22px; border-radius: 6px;
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: all 0.15s ease;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:hover { background: var(--orange-light); transform: translateY(-1px); }
  .btn-secondary {
    background: transparent; color: #fff;
    border: 1px solid var(--gray);
  }
  .btn-secondary:hover { background: var(--dark); border-color: var(--orange); }
  .btn-ghost {
    background: transparent; color: var(--light);
    font-size: 12px; letter-spacing: 1px;
  }
  .btn-ghost:hover { color: var(--orange); }

  .results-screen { animation: fadeUp 0.5s ease; }
  .results-hero {
    background: linear-gradient(135deg, var(--near), var(--dark));
    border: 1px solid var(--orange-border);
    border-radius: 12px; padding: 40px 32px; text-align: center;
    position: relative; overflow: hidden; margin-bottom: 24px;
  }
  .results-hero::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--orange), var(--red));
  }
  .results-rank {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--orange); letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .results-title {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
    font-size: 56px; line-height: 0.95; letter-spacing: -1px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .results-rank-color { color: var(--orange); }
  .results-score {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 28px; color: #fff; margin-bottom: 16px;
  }
  .results-score .total { color: var(--light); }
  .results-meta {
    display: flex; gap: 18px; justify-content: center; flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--silver); letter-spacing: 1px;
  }
  .results-meta .v { color: var(--orange); font-weight: 600; }

  .results-breakdown {
    background: var(--near); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; margin-bottom: 24px;
  }
  .breakdown-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
  }
  .breakdown-header .label {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 14px; color: var(--orange); letter-spacing: 2px;
    text-transform: uppercase;
  }
  .breakdown-row {
    display: grid; grid-template-columns: 110px 1fr 60px;
    align-items: center; gap: 12px; padding: 8px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row .area {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
  }
  .breakdown-bar {
    height: 6px; background: var(--mid); border-radius: 3px; overflow: hidden;
  }
  .breakdown-fill {
    height: 100%; background: linear-gradient(90deg, var(--orange), var(--red));
    border-radius: 3px;
  }
  .breakdown-pct {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--orange); font-weight: 600; text-align: right;
  }

  .pb-banner {
    background: var(--orange-glow); border: 1px solid var(--orange-border);
    border-left: 4px solid var(--orange); border-radius: 6px;
    padding: 14px 18px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .pb-banner .pb-text {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 16px; color: var(--orange); letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .pb-banner .pb-sub {
    font-size: 12px; color: var(--silver); margin-left: auto;
  }

  .streak {
    position: fixed; right: 24px; top: 80px;
    background: var(--near); border: 1px solid var(--orange-border);
    border-radius: 6px; padding: 8px 14px;
    display: flex; align-items: center; gap: 8px;
    z-index: 50;
    animation: fadeUp 0.4s ease;
  }
  .streak .label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--light); letter-spacing: 1.5px;
  }
  .streak .value {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 18px; color: var(--orange);
  }
  .streak.fire {
    border-color: var(--red); animation: pulse 1s infinite;
  }
  .streak.fire .value { color: var(--red); }

  .footer {
    margin-top: auto; padding-top: 32px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .footer-left {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--gray); letter-spacing: 1.5px;
  }
  .footer-right { display: flex; gap: 12px; }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--orange), var(--red), var(--orange));
    z-index: 100;
  }

  @media (max-width: 600px) {
    .hero h1 { font-size: 48px; }
    .question-text { font-size: 18px; }
    .results-title { font-size: 40px; }
    .breakdown-row { grid-template-columns: 90px 1fr 50px; gap: 8px; }
    .stats-pill { padding: 6px 10px; gap: 8px; }
    .stat-item .value { font-size: 16px; }
    .streak { right: 12px; top: 70px; padding: 6px 10px; }
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="progress-bar" id="progressBar" style="width: 0%"></div>
<div class="container" id="app"></div>
<div class="bottom-bar"></div>

<script>
const boltIcon = (size = 16, color = "#FBB031") =>
  `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></svg>`;

// =================== QUESTION BANK ===================
const QUESTIONS = [
  // ============================================
  // ============ GEO / AI / DIGITAL ============
  // ============================================
  {
    section: 'geo', difficulty: 'easy', type: 'knowledge',
    q: "What does 'GEO' stand for in marketing today?",
    options: [
      "Geographic Engine Optimization",
      "Generative Engine Optimization",
      "Global Engagement Operations",
      "Google Enhanced Optimization"
    ],
    correct: 1,
    explanation: "<strong>Generative Engine Optimization</strong> is the practice of optimizing content and brand presence so AI engines (ChatGPT, Claude, Perplexity, Gemini, Google AI Overviews) cite you accurately when users ask questions. It's distinct from traditional SEO because the goal is being included in the AI's <em>generated answer</em>, not ranking on a page of links.",
    proTip: "Some marketers use AEO (Answer Engine Optimization) interchangeably. Don't get stuck on the acronym — focus on the underlying problem: showing up in AI-generated answers."
  },
  {
    section: 'geo', difficulty: 'easy', type: 'knowledge',
    q: "Roughly how many sources does an LLM typically cite per generated answer?",
    options: ["10 like Google's blue links", "2-7 sources", "20+ sources", "Just one"],
    correct: 1,
    explanation: "LLMs typically cite only <strong>2-7 sources per answer</strong>, dramatically less than Google's 10 blue links. That means GEO winners take far more share than SEO winners — the long tail effectively disappears.",
    proTip: "This is the single most important argument for caring about GEO at all. Use it when explaining why the team should invest now."
  },
  {
    section: 'geo', difficulty: 'easy', type: 'knowledge',
    q: "Which of these is NOT a major AI search platform that brands monitor for visibility?",
    options: ["Perplexity", "Google AI Overviews", "ChatGPT", "Yahoo! Answers"],
    correct: 3,
    explanation: "Yahoo! Answers shut down in 2021 and was a Q&A community, not an AI engine. The major platforms tracked for AI visibility today are <strong>ChatGPT, Claude, Perplexity, Gemini, and Google AI Overviews</strong>.",
    proTip: "Bing Copilot is also worth knowing. Microsoft's positioning in AI search is often underweighted in conversations."
  },
  {
    section: 'geo', difficulty: 'medium', type: 'knowledge',
    q: "Which of these has been shown to outperform traditional backlinks for AI Overview presence?",
    options: ["Domain authority score", "Web mentions (earned media without links)", "Meta description optimization", "Schema.org structured data"],
    correct: 1,
    explanation: "<strong>Web mentions outperform backlinks roughly 3:1</strong> for presence in AI Overviews. LLMs prioritize earned brand visibility over the link graph that defined traditional SEO. Reddit, LinkedIn, and YouTube are among the most-cited sources.",
    proTip: "This is why CPG brands with strong earned media (like Gatorade) have a structural advantage — but also why they need to think about Reddit and forum mentions, not just press."
  },
  {
    section: 'geo', difficulty: 'medium', type: 'knowledge',
    q: "Which content structure best supports being extracted and cited by AI engines?",
    options: [
      "Long flowing paragraphs with lots of brand storytelling",
      "Direct answers up top, FAQ schema, paragraphs under 120 words, comparison tables",
      "Heavy keyword density throughout the page",
      "Image-heavy pages with minimal text"
    ],
    correct: 1,
    explanation: "AI extraction favors <strong>direct answers up top, clear H2/H3 hierarchy, FAQ schema, paragraphs under 120 words, and comparison tables</strong>. The model needs to find the answer fast and parse it cleanly. Marketing-style narrative copy is harder for LLMs to extract.",
    proTip: "This is a common tension at CPG brands — brand teams want lyrical copy, AI discoverability needs structured copy. The answer is usually 'lead with the structured answer, then add the brand layer below.'"
  },
  {
    section: 'geo', difficulty: 'medium', type: 'knowledge',
    q: "What's the role of 'entity authority' in GEO?",
    options: [
      "It's the page-level keyword density",
      "It's how clearly an LLM can identify, recognize, and trust your brand as a verified entity (linked to Wikipedia, Wikidata, structured data)",
      "It's a measure of paid ad spend",
      "It's the number of inbound links to your homepage"
    ],
    correct: 1,
    explanation: "<strong>Entity authority is how cleanly an LLM recognizes your brand as a real, verified entity</strong>. Linking to Wikipedia/Wikidata, using consistent structured data, and building topical depth around a single entity all matter. Without entity clarity, the model may not associate your content with your brand at all.",
    proTip: "Gatorade has incredible entity recognition (60+ years, Wikipedia presence, sports science publications). The work is making sure it's correctly linked across product variants — Gatorade vs Gatorlyte vs Propel all have entity issues."
  },
  {
    section: 'geo', difficulty: 'medium', type: 'knowledge',
    q: "Which is the most important factor in 'freshness' for AI discoverability?",
    options: [
      "How often you update your homepage",
      "Recently updated content that matches the query intent, with clear date signals",
      "Frequent social media posts",
      "Daily blog posts on any topic"
    ],
    correct: 1,
    explanation: "<strong>Freshness is about content that matches current query intent and has clear date signals</strong> (last-updated metadata, dated FAQ entries, recent timestamps). Random updates don't help. Updates that align with what consumers are asking right now do.",
    proTip: "This is why a 'Trust What's Inside' campaign moment requires fresh, dated FAQ content tied to the exact questions consumers will ask AI engines about the campaign."
  },
  {
    section: 'geo', difficulty: 'hard', type: 'knowledge',
    q: "A 2025 Princeton study on citation bias found AI engines tend to favor what kind of content?",
    options: [
      "Brand-owned (.com) content over earned media",
      "Earned media over brand-owned content",
      "Wikipedia exclusively",
      "Paid placements"
    ],

const STORAGE_KEY = 'gatorade-combine-state-v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    personalBest: { all: 0, geo: 0, brand: 0, commercial: 0, rob: 0 },
    sessionsCompleted: 0,
    totalAnswered: 0,
    totalCorrect: 0,
  };
}
function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

let state = loadState();
let session = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getQuestionsForSection(section, count) {
  const pool = section === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.section === section);
  return shuffle(pool).slice(0, Math.min(count, pool.length));
}

function rankFor(pct) {
  if (pct >= 95) return { name: 'MVP', color: 'var(--orange)', sub: 'Hall of Fame caliber.' };
  if (pct >= 85) return { name: 'PRO BOWL', color: 'var(--orange)', sub: 'Top of the league.' };
  if (pct >= 70) return { name: 'STARTER', color: 'var(--orange)', sub: 'Earned the start.' };
  if (pct >= 50) return { name: 'ROOKIE', color: 'var(--silver)', sub: 'On the roster.' };
  return { name: 'PRACTICE SQUAD', color: 'var(--light)', sub: 'Keep grinding.' };
}

  document.getElementById('progressBar').style.width = pct + '%';
}

        </div>
      </button>

      <button class="mode-card purple" onclick="startSession('rob', 10)">
        <div class="mode-num">05 / ROB LAB</div>
        <div class="mode-title">Platform<br/>&amp; Ecosystem</div>
        <div class="mode-subtitle">Rob's specific domain. His career, the Gx ecosystem, Gatorade.com, his philosophy.</div>
        <div class="mode-meta">
          <span>10 questions</span>
          <span>•</span>
          <span>${counts.rob} total</span>
          <span>•</span>
          <span class="pb">PB: ${pb.rob}%</span>
        </div>
      </button>
    </div>

    <div class="footer fade-up">
      <div class="footer-left">BUILT FOR BLAKE  /  ${QUESTIONS.length} QUESTIONS  /  ROUND 03 PREP</div>
      <div class="footer-right">
        <button class="btn-ghost" onclick="resetStats()">Reset Stats</button>
      </div>
    </div>
  `;
}

function startSession(section, count) {
  const questions = getQuestionsForSection(section, count);
  session = {
    section,
    questions,
    currentIndex: 0,
    answers: [],
    streak: 0,
    maxStreak: 0,
    startTime: Date.now(),
  };
  renderQuestion();
}

function renderQuestion() {
  const q = session.questions[session.currentIndex];
  const total = session.questions.length;
  const idx = session.currentIndex;
  const pct = ((idx) / total) * 100;
  updateProgress(pct);

  const app = document.getElementById('app');
  const diffClass = q.difficulty === 'easy' ? 'diff-easy' :
                    q.difficulty === 'medium' ? 'diff-medium' : 'diff-hard';

  const streakHTML = session.streak >= 3 ? `
    <div class="streak ${session.streak >= 5 ? 'fire' : ''}">
      <div class="label">STREAK</div>
      <div class="value">${session.streak}🔥</div>
    </div>
  ` : '';

  const sectionLabels = { geo: 'GEO LAB', brand: 'BRAND LAB', commercial: 'OPS LAB', rob: 'ROB LAB' };
  const isRob = q.section === 'rob';

  app.innerHTML = `
    ${streakHTML}
    <div class="header fade-up">
      <div class="logo">
        ${boltIcon(20, 'var(--orange)')}
        <span class="logo-text">The Gatorade Combine</span>
      </div>
      <button class="btn-ghost" onclick="confirmExit()">← Exit</button>
    </div>

    <div class="quiz-screen">
      <div class="quiz-meta">
        <div class="quiz-meta-left">
          <div class="difficulty-badge ${diffClass}">${q.difficulty}</div>
          <div class="question-counter">Q ${idx + 1} / ${total}</div>
        </div>
        <div class="quiz-progress">
          <div class="quiz-progress-fill" style="width: ${(idx / total) * 100}%"></div>
        </div>
      </div>

      <div class="question-card ${isRob ? 'purple' : ''}">
        <div class="question-type ${isRob ? 'purple' : ''}">
          ${q.type === 'scenario' ? '⚡ Scenario Drill' : '◇ Knowledge Check'}
          &nbsp;&nbsp;/&nbsp;&nbsp;
          ${sectionLabels[q.section]}
        </div>
        <div class="question-text">${q.q}</div>
        ${q.context ? `<div class="question-context">${q.context}</div>` : ''}
      </div>

      <div class="answers" id="answersContainer">
        ${q.options.map((opt, i) => `
          <button class="answer" onclick="selectAnswer(${i})" data-idx="${i}">
            <span class="letter">${String.fromCharCode(65 + i)}</span>
            <span class="text">${opt}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function selectAnswer(selectedIdx) {
  const q = session.questions[session.currentIndex];
  const correct = selectedIdx === q.correct;

  session.answers.push({
    section: q.section,
    correct,
    questionIdx: session.currentIndex,
  });

  if (correct) {
    session.streak += 1;
    if (session.streak > session.maxStreak) session.maxStreak = session.streak;
  } else {
    session.streak = 0;
  }

  const buttons = document.querySelectorAll('.answer');
  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    btn.onclick = null;
    if (i === q.correct) btn.classList.add('correct');
    if (i === selectedIdx && i !== q.correct) btn.classList.add('incorrect');
  });

  const feedbackHTML = `
    <div class="feedback ${correct ? 'correct' : 'incorrect'}">
      <div class="feedback-header">
        <div class="feedback-badge ${correct ? 'correct' : 'incorrect'}">${correct ? '✓ Nice' : '✕ Reset'}</div>
        <h3>${correct ? "That's the play." : "Here's the better answer:"}</h3>
      </div>
      <p>${q.explanation}</p>
      ${q.proTip ? `
        <div class="pro-tip">
          <span class="pro-tip-label">PRO TIP</span>${q.proTip}
        </div>
      ` : ''}
    </div>
    <div class="actions">
      <button class="btn" onclick="nextQuestion()">
        ${session.currentIndex + 1 >= session.questions.length ? 'See Results' : 'Next Question'}
        ${boltIcon(12, '#000')}
      </button>
    </div>
  `;

  const answersContainer = document.getElementById('answersContainer');
  answersContainer.insertAdjacentHTML('afterend', feedbackHTML);

  const total = session.questions.length;
  updateProgress(((session.currentIndex + 1) / total) * 100);
}

function nextQuestion() {
  session.currentIndex += 1;
  if (session.currentIndex >= session.questions.length) {
    finishSession();
  } else {
    renderQuestion();
  }
}

function confirmExit() {
  if (confirm("Exit this session? Your progress won't be saved.")) {
    renderHome();
  }
}

function finishSession() {
  const total = session.answers.length;
  const correct = session.answers.filter(a => a.correct).length;
  const pct = Math.round((correct / total) * 100);
  const elapsed = Math.round((Date.now() - session.startTime) / 1000);

  state.sessionsCompleted += 1;
  state.totalAnswered += total;
  state.totalCorrect += correct;

  const sectionKey = session.section === 'all' ? 'all' : session.section;
  let isPB = false;
  if (pct > state.personalBest[sectionKey]) {
    state.personalBest[sectionKey] = pct;
    isPB = true;
  }
  saveState(state);

  const breakdown = {};
  session.answers.forEach(a => {
    if (!breakdown[a.section]) breakdown[a.section] = { correct: 0, total: 0 };
    breakdown[a.section].total += 1;
    if (a.correct) breakdown[a.section].correct += 1;
  });

  const rank = rankFor(pct);
  updateProgress(100);

  const sectionLabels = { geo: 'GEO LAB', brand: 'BRAND LAB', commercial: 'OPS LAB', rob: 'ROB LAB' };

  const breakdownHTML = Object.keys(breakdown).length > 1 ? `
    <div class="results-breakdown fade-up">
      <div class="breakdown-header">
        ${boltIcon(14, 'var(--orange)')}
        <div class="label">Section Breakdown</div>
      </div>
      ${Object.entries(breakdown).map(([sec, data]) => {
        const sPct = Math.round((data.correct / data.total) * 100);
        return `
          <div class="breakdown-row">
            <div class="area">${sectionLabels[sec]}</div>
            <div class="breakdown-bar">
              <div class="breakdown-fill" style="width: ${sPct}%"></div>
            </div>
            <div class="breakdown-pct">${data.correct}/${data.total}</div>
          </div>
        `;
      }).join('')}
    </div>
  ` : '';

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header fade-up">
      <div class="logo">
        ${boltIcon(20, 'var(--orange)')}
        <span class="logo-text">The Gatorade Combine</span>
      </div>
      <button class="btn-ghost" onclick="renderHome()">← Home</button>
    </div>

    <div class="results-screen">
      <div class="results-hero">
        <div class="results-rank">DRAFT CARD</div>
        <div class="results-title">
          <span class="results-rank-color" style="color: ${rank.color}">${rank.name}</span>
        </div>
        <div class="results-score">${correct}<span class="total">/${total} (${pct}%)</span></div>
        <div class="results-meta">
          <span>${rank.sub}</span>
          <span style="color: var(--gray)">•</span>
          <span>Max streak: <span class="v">${session.maxStreak}</span></span>
          <span style="color: var(--gray)">•</span>
          <span>Time: <span class="v">${elapsed}s</span></span>
        </div>
      </div>

      ${isPB ? `
        <div class="pb-banner">
          ${boltIcon(16, 'var(--orange)')}
          <div class="pb-text">New Personal Best</div>
          <div class="pb-sub">Section: ${session.section === 'all' ? 'Full Combine' : sectionLabels[session.section]}</div>
        </div>
      ` : ''}

      ${breakdownHTML}

      <div class="actions">
        <button class="btn" onclick="startSession('${session.section}', ${total})">
          Run It Back ${boltIcon(12, '#000')}
        </button>
        <button class="btn btn-secondary" onclick="renderHome()">
          Pick Different Drill
        </button>
      </div>

      <div class="footer">
        <div class="footer-left">SESSION ${state.sessionsCompleted}  /  TOTAL: ${state.totalCorrect}/${state.totalAnswered}</div>
      </div>
    </div>
  `;
}

function resetStats() {
  if (confirm("Reset all stats and personal bests? This can't be undone.")) {
    state = {
      personalBest: { all: 0, geo: 0, brand: 0, commercial: 0, rob: 0 },
      sessionsCompleted: 0,
      totalAnswered: 0,
      totalCorrect: 0,
    };
    saveState(state);
    renderHome();
  }
}

renderHome();
</script>
</body>
</html>
